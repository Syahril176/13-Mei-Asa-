<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Asa 🐸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   CARA EDIT KARTU INI:
   1. Ganti NAMA     → cari tulisan "Asa" di bagian CONFIG di bawah
   2. Ganti PESAN    → cari bagian PESAN di CONFIG
   3. Ganti FOTO     → simpan foto kamu sebagai file bernama "foto.jpg"
                       di folder yang sama dengan file HTML ini, ATAU
                       ganti URL foto di bagian CONFIG
   4. Ganti LAGU     → simpan mp3 sebagai "lagu.mp3" di folder yang sama
   5. Buka di Chrome → langsung tampil!
══════════════════════════════════════ */

  :root {
    --bg: #e8f5f0;          /* warna background hijau mint */
    --card: #ffffff;
    --pink: #e8527a;
    --pink2: #f080a0;
    --green: #5a8a52;
    --lavender: #c0b0e0;
    --ink: #2a2420;
    --cream: #f5ede0;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Caveat', cursive;
    overflow-x: hidden;
  }

  /* grain */
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── HEADER ── */
  .header-title {
    text-align: center;
    padding: 28px 20px 0;
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 5vw, 1.5rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(42,36,32,0.25);
    font-weight: 400;
    animation: fadeDown 0.8s ease both;
  }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }

  .header-greeting {
    text-align: center;
    padding: 10px 20px 0;
    font-family: 'Caveat', cursive;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: #5a4a42;
    animation: fadeDown 0.8s 0.15s ease both;
    font-weight: 600;
  }

  /* ── BOUQUET ── */
  .bouquet-section {
    display: flex;
    justify-content: center;
    padding: 10px 0 0;
    animation: fadeUp 1s 0.2s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .bouquet-wrap {
    position: relative;
    width: min(340px, 90vw);
    height: min(360px, 95vw);
  }

  .bouquet-svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 6px 20px rgba(42,36,32,0.1));
  }

  /* Tulip petals sway */
  .petals-group { animation: sway 3.5s ease-in-out infinite; transform-origin: 50% 90%; }
  @keyframes sway { 0%,100%{transform:rotate(-1.5deg)} 50%{transform:rotate(1.5deg)} }

  /* Photo button */
  .photo-trigger {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 76px; height: 76px;
    border-radius: 50%;
    cursor: pointer;
    border: 3.5px solid var(--lavender);
    overflow: hidden;
    background: #f0e8f8;
    box-shadow: 0 4px 18px rgba(192,176,224,0.55);
    transition: transform 0.25s;
    animation: photoPulse 2.2s ease-in-out infinite;
    z-index: 10;
  }
  @keyframes photoPulse {
    0%,100%{box-shadow:0 4px 18px rgba(192,176,224,.5)}
    50%{box-shadow:0 4px 28px rgba(192,176,224,.9), 0 0 0 7px rgba(192,176,224,.18)}
  }
  .photo-trigger:hover { transform: translateX(-50%) scale(1.08); }
  .photo-trigger img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }

  /* hint */
  .photo-hint {
    text-align: center;
    font-size: 1rem;
    color: rgba(42,36,32,0.4);
    margin: 4px 0 14px;
    animation: fadeUp 1s 0.5s ease both;
  }

  /* ── MUSIC PLAYER ── */
  .music-wrap {
    padding: 0 20px;
    max-width: 480px;
    margin: 0 auto 16px;
    animation: fadeUp 1s 0.55s ease both;
  }
  .music-player {
    background: rgba(210,210,230,0.28);
    border-radius: 18px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid rgba(192,176,224,0.35);
    backdrop-filter: blur(4px);
  }
  .play-btn {
    width: 48px; height: 48px;
    background: #e8a030;
    border-radius: 14px;
    border: none; cursor: pointer;
    font-size: 1.3rem;
    display: flex; align-items:center; justify-content:center;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(232,160,48,0.4);
    transition: all 0.2s;
    color: white;
  }
  .play-btn:hover { transform:scale(1.07); box-shadow:0 4px 18px rgba(232,160,48,0.5); }
  .music-info { flex:1; min-width:0; }
  .music-title { font-size: 1.05rem; color: var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
  .music-bar { width:100%; height:3px; background:rgba(192,176,224,.3); border-radius:2px; overflow:hidden; }
  .music-bar-fill { height:100%; background: linear-gradient(90deg,var(--lavender),var(--pink)); border-radius:2px; width:0%; transition:width .5s linear; }
  .music-note { font-size:1.5rem; color:#8090aa; }

  /* ── MESSAGE CARD ── */
  .msg-wrap {
    padding: 0 20px;
    max-width: 480px;
    margin: 0 auto 30px;
    animation: fadeUp 1s 0.7s ease both;
  }
  .message-card {
    background: white;
    border-radius: 22px;
    padding: 26px 24px 22px;
    box-shadow: 0 4px 24px rgba(42,36,32,0.08);
    border: 1px solid rgba(192,176,224,0.2);
    position: relative;
  }
  .msg-deco {
    position: absolute;
    top: -13px; right: 18px;
    font-size: 1.6rem;
  }
  .msg-to {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .msg-body {
    font-size: 1.2rem;
    color: #3a3230;
    line-height: 1.75;
    margin-bottom: 18px;
    white-space: pre-wrap;
  }
  .msg-body .highlight {
    font-style: italic;
    font-weight: 700;
    font-size: 1.25rem;
    color: var(--ink);
  }
  .msg-from {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(42,36,32,0.45);
    text-align: right;
  }

  /* petals */
  .petal { position:fixed; pointer-events:none; animation:petalFall linear infinite; opacity:0; z-index:5; }
  @keyframes petalFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:.75} 100%{transform:translateY(110vh) rotate(540deg);opacity:0} }

  /* ── PHOTO MODAL ── */
  .photo-modal {
    display:none; position:fixed; inset:0;
    background:rgba(30,24,20,.65);
    z-index:600; align-items:center; justify-content:center;
    backdrop-filter: blur(10px);
  }
  .photo-modal.open { display:flex; animation:mIn .3s ease; }
  @keyframes mIn{from{opacity:0}to{opacity:1}}
  .modal-inner {
    background: white; border-radius: 28px; padding: 30px 24px 24px;
    max-width: 340px; width: 90%; text-align: center;
    animation: mUp .3s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  @keyframes mUp{from{transform:scale(.88) translateY(24px)}to{transform:scale(1) translateY(0)}}
  .modal-photo {
    width: 210px; height: 210px;
    border-radius: 50%; object-fit:cover;
    border: 4px solid var(--lavender);
    box-shadow: 0 8px 32px rgba(192,176,224,.45);
    margin-bottom: 18px;
    display: block; margin-left: auto; margin-right: auto;
  }
  .modal-name {
    font-family:'Playfair Display',serif; font-style:italic;
    font-size: 1.55rem; color:var(--ink); margin-bottom:6px;
    font-weight: 700;
  }
  .modal-sub { font-size:1.05rem; color:#aaa; margin-bottom:18px; }
  .modal-close {
    padding:11px 32px; background:var(--lavender);
    border:none; border-radius:22px; color:white;
    font-family:'Caveat',cursive; font-size:1.15rem;
    cursor:pointer; transition:all .2s;
  }
  .modal-close:hover { background:#b0a0d0; }

  /* footer */
  .footer { text-align:center; padding:0 20px 40px; }
  .footer p { font-size:.85rem; color:rgba(42,36,32,.3); letter-spacing:.05em; }
</style>
</head>
<body>

<script>
// ╔══════════════════════════════════╗
// ║         CONFIG KARTU             ║
// ╠══════════════════════════════════╣

const CONFIG = {

  // Judul kecil di atas (huruf kapital semua)
  headerTitle: "HAPPY BIRTHDAY KODOK",

  // Sapaan utama (muncul di bawah judul)
  headerGreeting: "❤Asa ini buat kamu! 🌸",

  // Nama penerima (muncul di popup foto & kartu pesan)
  namaTo: "Asa",

  // Isi pesan — gunakan \n untuk baris baru
  // Teks yang ingin KAPITAL & miring: tulis dengan [[ ]]  
pesan: "Happy birthday asa 🎊, semoga kamu panjang umur, sehat² selalu ya. Semoga semua yang sedang kamu usahakan juga berjalan lancar. Selamat ulang tahun yaa 🎉 Semoga semua hal² baik selalu datang ke kamu, makin bahagia, makin ceria, dan semua yang kamu pengenin bisa tercapai. Makasih udah jadi salah satu orang favoritku ❤️ Pokoknya jaga kesehatan juga jangan suka begadang kalo ga penting² amat yah. \nAku juga mau bilang makasih, karena sejak kamu datang aku jadi belajar banyak hal baru yang aku sadarin atau yang aku gatau dari kamu. Kalau kita nggak pernah ketemu, mungkin aku nggak akan kepikiran buat jadi seperti sekarang atau ngelakuin hal² kayak gini. Jadi, makasih ya udah hadir dan ngasih ruang buat aku belajar berpikir, dan tumbuh sedikit demi sedikit. senang bisa kenal kamu sampai sekarang ✨ ❤️ \ndan yang paling penting~~\n[[UMURNYA SUDAH TIDAK BOHONG LAGI]] 😹😡🐸❤️🥳✨💥🔥",

  // Nama pengirim
  dari: "Sincerely, Alli",

  // ── FOTO ──
  // Cara 1: taruh file foto (jpg/png) di folder sama, tulis namanya di sini
  // Cara 2: tulis URL foto online  (contoh: "https://i.imgur.com/xxx.jpg")
  // Cara 3: kosongkan → tampil emoji kodok sebagai placeholder
  fotoSrc: "foto.jpg",   // ← ganti dengan nama file foto, contoh: "foto.jpg"

  // Teks popup foto
  fotoCaption: "Wopyu comach, mwaahh! 🌸",

  // ── LAGU ──
  // Taruh file mp3 di folder sama, tulis namanya di sini
  // Kosongkan jika tidak ada lagu
  laguSrc: "lagu.mp3",   // ← contoh: "lagu.mp3"
  laguJudul: "Not A Lot, Just Forever",

  // ── TEMA BUNGA ──
  // Pilihan: "pink" | "lavender" | "sun" | "tulip"
  temaBunga: "pink",

  // ── WARNA BACKGROUND ──
  // Pilihan warna: "#e8f5f0" (mint), "#fdf0f5" (blush), "#f0f4fd" (blue), "#fefce8" (yellow)
  bgColor: "#e8f5f0",
};

// ╚══════════════════════════════════╝
// (jangan ubah kode di bawah ini)
</script>
<!-- ══ AKHIR ZONA EDIT ══ -->


<!-- HEADER -->
<div class="header-title" id="header-title"></div>
<div class="header-greeting" id="header-greeting"></div>

<!-- BOUQUET -->
<div class="bouquet-section">
  <div class="bouquet-wrap">
    <svg class="bouquet-svg" id="bouquet-svg" viewBox="0 0 340 370" xmlns="http://www.w3.org/2000/svg">
      <!-- background circle -->
      <circle cx="170" cy="165" r="138" fill="var(--cream)" opacity="0.75"/>

      <!-- stems -->
      <g class="petals-group" id="stems-group">
        <line x1="170" y1="340" x2="170" y2="210" stroke="#5a7a52" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="170" y1="340" x2="122" y2="255" stroke="#5a7a52" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="170" y1="340" x2="218" y2="255" stroke="#5a7a52" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="170" y1="340" x2="90"  y2="290" stroke="#5a7a52" stroke-width="3" stroke-linecap="round"/>
        <line x1="170" y1="340" x2="250" y2="290" stroke="#5a7a52" stroke-width="3" stroke-linecap="round"/>
        <line x1="85"  y1="210" x2="122" y2="255" stroke="#5a7a52" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="255" y1="210" x2="218" y2="255" stroke="#5a7a52" stroke-width="2.5" stroke-linecap="round"/>
        <!-- leaves -->
        <ellipse cx="136" cy="268" rx="20" ry="10" fill="#6bae62" transform="rotate(-38,136,268)"/>
        <ellipse cx="204" cy="268" rx="20" ry="10" fill="#6bae62" transform="rotate(38,204,268)"/>
        <ellipse cx="100" cy="298" rx="17" ry="8"  fill="#5a9852" transform="rotate(-52,100,298)"/>
        <ellipse cx="240" cy="298" rx="17" ry="8"  fill="#5a9852" transform="rotate(52,240,298)"/>
        <ellipse cx="148" cy="240" rx="22" ry="9"  fill="#7abe70" transform="rotate(-28,148,240)"/>
        <ellipse cx="192" cy="240" rx="22" ry="9"  fill="#7abe70" transform="rotate(28,192,240)"/>
        <ellipse cx="82"  cy="206" rx="14" ry="7"  fill="#6bae62" transform="rotate(-65,82,206)"/>
        <ellipse cx="258" cy="206" rx="14" ry="7"  fill="#6bae62" transform="rotate(65,258,206)"/>

        <circle cx="170" cy="222" r="14" fill="#f5d67a"/>

      </g>

      <!-- flowers rendered by JS -->
      <g id="flowers-group"></g>

    <!-- Photo button -->
    <div class="photo-trigger" id="photo-trigger" onclick="openModal()">

</div>

<!-- hint -->
<p class="photo-hint"> coba klik foto sama play lagunya asa!</p>

<!-- MUSIC PLAYER -->
<div class="music-wrap" id="music-wrap" style="display:none;">
  <div class="music-player">
    <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
    <div class="music-info">
      <div class="music-title" id="music-title-txt">lagu</div>
      <div class="music-bar"><div class="music-bar-fill" id="music-bar-fill"></div></div>
    </div>
    <div class="music-note">♪</div>
  </div>
</div>

<!-- MESSAGE -->
<div class="msg-wrap">
  <div class="message-card">
    <div class="msg-deco">💌</div>
    <div class="msg-to" id="msg-to"></div>
    <div class="msg-body" id="msg-body"></div>
    <div class="msg-from" id="msg-from"></div>
  </div>
</div>

<div class="footer"><p>made with 🌸 Alli</p></div>

<!-- PHOTO MODAL -->
<div class="photo-modal" id="photo-modal">
  <div class="modal-inner">
    <img class="modal-photo" id="modal-photo" src="" alt="">
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <button class="modal-close" onclick="closeModal()">Tutup ✕</button>
  </div>
</div>

<audio id="audio" loop></audio>

<script>
// ── APPLY CONFIG ──────────────────────────────────────────
document.body.style.background = CONFIG.bgColor;
document.getElementById('header-title').textContent = CONFIG.headerTitle;
document.getElementById('header-greeting').innerHTML = CONFIG.headerGreeting;

// Message: parse [[ ]] as highlight
function renderMsg(raw) {
  return raw.replace(/\[\[(.+?)\]\]/g, '<span class="highlight">$1</span>').replace(/\n/g,'<br>');
}
document.getElementById('msg-to').innerHTML = `Dear ${CONFIG.namaTo} ❤️ 🎂`;
document.getElementById('msg-body').innerHTML = renderMsg(CONFIG.pesan);
document.getElementById('msg-from').textContent = CONFIG.dari;

// Modal
document.getElementById('modal-name').innerHTML = `🎂 Happy Birthday, ${CONFIG.namaTo}!`;
document.getElementById('modal-sub').textContent = CONFIG.fotoCaption;

// Photo
const photoEl = document.getElementById('photo-img');
const modalPhotoEl = document.getElementById('modal-photo');
if (CONFIG.fotoSrc) {
  photoEl.src = CONFIG.fotoSrc;
  modalPhotoEl.src = CONFIG.fotoSrc;
} else {
  // placeholder: frog emoji rendered as text in circle
  document.getElementById('photo-trigger').innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;border-radius:50%;">🐸</div>';
  modalPhotoEl.src = '';
  modalPhotoEl.style.display = 'none';
  document.querySelector('.modal-inner').insertAdjacentHTML('afterbegin','<div style="font-size:5rem;margin-bottom:12px;">🐸</div>');
}

// Music
const audioEl = document.getElementById('audio');
if (CONFIG.laguSrc) {
  audioEl.src = CONFIG.laguSrc;
  document.getElementById('music-title-txt').textContent = CONFIG.laguJudul;
  document.getElementById('music-wrap').style.display = 'block';
  // autoplay on user interaction
  document.addEventListener('click', function autoplay() {
    audioEl.play().catch(()=>{});
    document.getElementById('play-btn').textContent = '⏸';
    isPlaying = true;
    startProgress();
    document.removeEventListener('click', autoplay);
  }, { once: true });
}

// ── FLOWERS ──────────────────────────────────────────────
const themes = {
  pink:     { c1:'#e8527a', c2:'#f5a0c0', fn:'tulip' },
  lavender: { c1:'#9b7fd4', c2:'#b8d4f0', fn:'iris'  },
  sun:      { c1:'#f5c842', c2:'#e6a820', fn:'sun'   },
  tulip:    { c1:'#e85090', c2:'#f080a8', fn:'tulip' },
};

function makeTulip(cx,cy,s,c) {
  return `<g transform="translate(${cx},${cy})">
    <ellipse rx="${s*.58}" ry="${s*.88}" fill="${c}" opacity=".82" transform="rotate(-18) translate(-${s*.22},0)"/>
    <ellipse rx="${s*.58}" ry="${s*.88}" fill="${c}" opacity=".82" transform="rotate(18) translate(${s*.22},0)"/>
    <ellipse rx="${s*.5}" ry="${s*1}" fill="${c}" opacity=".9"/>
    <ellipse rx="${s*.25}" ry="${s*.65}" fill="rgba(255,255,255,.28)"/>
  </g>`;
}
function makeIris(cx,cy,s,c1,c2) {
  return `<g transform="translate(${cx},${cy})">
    <ellipse rx="${s*.72}" ry="${s*1.12}" fill="${c1}" opacity=".82" transform="rotate(-42)"/>
    <ellipse rx="${s*.72}" ry="${s*1.12}" fill="${c1}" opacity=".82" transform="rotate(42)"/>
    <ellipse rx="${s*.72}" ry="${s*1.12}" fill="${c1}" opacity=".82"/>
    <ellipse rx="${s*.5}"  ry="${s*.82}"  fill="${c2}" opacity=".72"/>
    <ellipse rx="${s*.22}" ry="${s*.62}"  fill="white" opacity=".38"/>
    <circle r="${s*.2}" fill="#f5d090"/>
  </g>`;
}
function makeSun(cx,cy,s) {
  let p='';
  for(let i=0;i<13;i++){const a=(i/13)*360;p+=`<ellipse rx="${s*.22}" ry="${s*.62}" fill="#f5c842" opacity=".92" transform="rotate(${a}) translate(0,-${s*.52})"/>`;}
  return `<g transform="translate(${cx},${cy})">${p}<circle r="${s*.33}" fill="#7a4a10"/><circle r="${s*.17}" fill="#9a6020"/></g>`;
}
function makeBud(cx,cy,s,c) {
  return `<g transform="translate(${cx},${cy})"><ellipse rx="${s*.38}" ry="${s*.52}" fill="${c}" opacity=".8"/><ellipse rx="${s*.2}" ry="${s*.36}" fill="rgba(255,255,255,.28)"/></g>`;
}

function buildBouquet(theme) {
  const t = themes[theme] || themes.pink;
  const fn = t.fn;
  const make = (cx,cy,s,big) => {
    if(fn==='sun') return makeSun(cx,cy,s);
    if(big) return fn==='iris'? makeIris(cx,cy,s,t.c1,t.c2) : makeTulip(cx,cy,s,t.c1);
    return makeBud(cx,cy,s,t.c2);
  };
  let out = '';
  // big flowers
  out += make(170, 128, 42, true);
  out += make(122, 155, 35, true);
  out += make(218, 155, 35, true);
  // buds
  out += make(90,  190, 19, false);
  out += make(250, 190, 19, false);
  out += make(148, 196, 17, false);
  out += make(192, 196, 17, false);
  return out;
}

document.getElementById('flowers-group').innerHTML = buildBouquet(CONFIG.temaBunga);

// ── MUSIC CONTROLS ────────────────────────────────────────
let isPlaying = false;
function togglePlay() {
  const btn = document.getElementById('play-btn');
  if (isPlaying) { audioEl.pause(); isPlaying=false; btn.textContent='▶'; }
  else { audioEl.play(); isPlaying=true; btn.textContent='⏸'; startProgress(); }
}
function startProgress() {
  const fill = document.getElementById('music-bar-fill');
  const tick = () => {
    if (audioEl.duration) fill.style.width = (audioEl.currentTime/audioEl.duration*100)+'%';
    if (isPlaying) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

// ── MODAL ─────────────────────────────────────────────────
function openModal() { document.getElementById('photo-modal').classList.add('open'); }
function closeModal() { document.getElementById('photo-modal').classList.remove('open'); }
document.getElementById('photo-modal').addEventListener('click', e => { if(e.target===document.getElementById('photo-modal')) closeModal(); });

// ── PETALS ────────────────────────────────────────────────
const petalMap = { pink:['🌸','💗','🌺'], lavender:['🌸','💜','✨'], sun:['🌻','⭐','✨'], tulip:['🌷','💖','🌸'] };
const petalEmojis = petalMap[CONFIG.temaBunga] || petalMap.pink;
function spawnPetals() {
  for(let i=0;i<22;i++) setTimeout(()=>{
    const p=document.createElement('div'); p.className='petal';
    p.textContent=petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
    p.style.cssText=`left:${Math.random()*100}vw;font-size:${.7+Math.random()*.85}rem;animation-duration:${4.5+Math.random()*5}s;animation-delay:${Math.random()*4}s;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),14000);
  }, i*350);
}
spawnPetals();
// respawn petals
setInterval(spawnPetals, 16000);
</script>
